<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Estadísticas - Magdalena Reporta</title>
<meta property="og:title" content="Estadísticas - Magdalena Reporta"/>
<meta property="og:description" content="Datos en tiempo real de reportes ciudadanos en Magdalena"/>
<meta name="description" content="Estadísticas en tiempo real de Magdalena Reporta"/>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<!-- Chart.js para gráficos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --morado: #7B2FBE;
  --morado-claro: #D4A5FF;
  --blanco: #fff;
  --gris-claro: #F3F0FA;
  --gris-medio: #E8E4F0;
  --texto: #1A1520;
  --texto-claro: #52456B;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--gris-claro);
  color: var(--texto);
}

header {
  background: linear-gradient(135deg, var(--morado) 0%, #5A1B8A 100%);
  color: var(--blanco);
  padding: 40px 20px;
  text-align: center;
  box-shadow: 0 4px 12px rgba(123, 47, 190, 0.2);
}
header h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 900;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
header p {
  font-size: 16px;
  opacity: 0.9;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}

.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.kpi {
  background: var(--blanco);
  padding: 24px;
  border-radius: 12px;
  border-left: 4px solid var(--morado);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.kpi-label {
  font-size: 13px;
  color: var(--texto-claro);
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 900;
  color: var(--morado);
}
.kpi-detail {
  font-size: 12px;
  color: var(--texto-claro);
  margin-top: 8px;
}

.seccion {
  background: var(--blanco);
  padding: 32px;
  border-radius: 12px;
  margin-bottom: 32px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.seccion h2 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--morado);
}

.graficos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 32px;
}
.grafico-container {
  position: relative;
  height: 300px;
}

.tabla {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.tabla th {
  background: var(--gris-claro);
  padding: 12px;
  text-align: left;
  font-weight: 600;
  color: var(--morado);
  border-bottom: 2px solid var(--morado);
}
.tabla td {
  padding: 12px;
  border-bottom: 1px solid var(--gris-medio);
}
.tabla tr:hover {
  background: var(--gris-claro);
}

.loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--texto-claro);
}
.spinner {
  border: 4px solid var(--gris-medio);
  border-top: 4px solid var(--morado);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.badge-pendiente {
  background: #FEE2E2;
  color: #DC2626;
}
.badge-solucionado {
  background: #DCFCE7;
  color: #16A34A;
}

footer {
  text-align: center;
  padding: 20px;
  color: var(--texto-claro);
  font-size: 12px;
  border-top: 1px solid var(--gris-medio);
  margin-top: 40px;
}

@media (max-width: 768px) {
  .container { padding: 20px 16px; }
  .seccion { padding: 20px; }
  .kpis { grid-template-columns: 1fr; }
  .graficos { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<header>
  <h1>MAGDALENA REPORTA</h1>
  <p>Estadísticas en tiempo real</p>
</header>

<div class="container">
  <div id="content" class="loading">
    <div class="spinner"></div>
    <p>Cargando datos...</p>
  </div>
</div>

<footer>
  <p>Datos actualizados en tiempo real desde Magdalena Reporta • Sistema colaborativo de monitoreo urbano</p>
</footer>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBOaptX3HKd9LYKXs46GLmb-tFbTzAb1Ec",
  authDomain: "magdalena-reporta-v2.firebaseapp.com",
  projectId: "magdalena-reporta-v2",
  storageBucket: "magdalena-reporta-v2.firebasestorage.app",
  messagingSenderId: "199471654104",
  appId: "1:199471654104:web:180223706d7015d25963ad"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Localidades con coordenadas
const localidades = {
  "Magdalena": { lat: -35.078277457477654, lng: -57.512493274834455 },
  "Empalme": { lat: -35.067382567575365, lng: -57.53957776223429 },
  "Atalaya": { lat: -35.02415200764085, lng: -57.53172486492953 },
  "Balneario": { lat: -35.03064023158587, lng: -57.50623627316817 },
  "Vieytes": { lat: -35.267113953698335, lng: -57.57598134837829 },
  "Ferrari": { lat: -35.29203888593361, lng: -57.86137580644807 },
  "Vergara": { lat: -35.38354509606231, lng: -57.80407985645849 },
  "Payro": { lat: -35.18051496943258, lng: -57.654465092630055 },
  "Arditi": { lat: -35.12882427664163, lng: -57.64499132129008 },
  "Los Naranjos": { lat: -34.99428237377507, lng: -57.702785370029694 },
  "El Pino": { lat: -35.011772563642516, lng: -57.68943971769248 },
  "Bavio": { lat: -35.081403835541614, lng: -57.74533018275587 }
};

// Categorías
const categorias = {
  "obra":      { name: "Obra sin terminar",           icon: "🚧" },
  "calle":     { name: "Calle en mal estado",          icon: "🕳️" },
  "luminaria": { name: "Luminaria sin funcionamiento", icon: "💡" },
  "basura":    { name: "Basura acumulada",             icon: "🗑️" },
  "cloaca":    { name: "Sin cloaca",                   icon: "🔧" },
  "agua":      { name: "Sin red de agua potable",      icon: "💧" },
  "aguas":     { name: "Aguas servidas",               icon: "☢️" },
  "faltlum":   { name: "Falta de luminaria",           icon: "🔦" },
  "tacho":     { name: "Sin tacho de basura",          icon: "🪣" },
  "rampa":     { name: "Rampa en mal estado",          icon: "♿" },
  "zanja":     { name: "Zanja en mal estado",          icon: "🌊" },
  "otro":      { name: "Otro",                         icon: "⚠️" }
};

// Detectar localidad por coordenadas
function detectarLocalidad(lat, lng) {
  let nearestCity = "Desconocida";
  let minDistance = Infinity;
  
  for (const [city, coords] of Object.entries(localidades)) {
    const dx = coords.lat - lat;
    const dy = coords.lng - lng;
    const distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < minDistance) {
      minDistance = distance;
      nearestCity = city;
    }
  }
  
  return nearestCity;
}

// Cargar y procesar datos
let allReports = {};
let charts = {};

db.collection("reports").onSnapshot(function(snapshot) {
  allReports = {};
  snapshot.forEach(function(doc) {
    allReports[doc.id] = doc.data();
  });
  renderEstadisticas();
}, function(err) {
  document.getElementById("content").innerHTML = '<p style="color:#C0392B;text-align:center;padding:40px;">Error al cargar datos.</p>';
});

function renderEstadisticas() {
  // Calcular estadísticas
  const reports = Object.values(allReports);
  const total = reports.length;
  const pendientes = reports.filter(r => r.status === "Pendiente").length;
  const solucionados = reports.filter(r => r.status === "Solucionado").length;
  const porcentajeSolucionados = total > 0 ? Math.round((solucionados / total) * 100) : 0;
  
  // Distribución por tipo
  const porTipo = {};
  reports.forEach(r => {
    if (r.cats && r.cats.length > 0) {
      r.cats.forEach(cat => {
        porTipo[cat.id] = (porTipo[cat.id] || 0) + 1;
      });
    }
  });
  
  // Distribución por localidad
  const porLocalidad = {};
  reports.forEach(r => {
    const city = detectarLocalidad(r.lat, r.lng);
    porLocalidad[city] = (porLocalidad[city] || 0) + 1;
  });
  
  // Top 3 problemas
  const topProblemas = Object.entries(porTipo)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([id, count]) => ({ 
      nombre: categorias[id]?.name || id, 
      count,
      icon: categorias[id]?.icon || "⚠️"
    }));
  
  // Top 3 localidades
  const topLocalidades = Object.entries(porLocalidad)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([ciudad, count]) => ({ ciudad, count }));
  
  // Render HTML
  const html = `
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Total de Reportes</div>
        <div class="kpi-value">${total}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Pendientes</div>
        <div class="kpi-value" style="color: #DC2626;">${pendientes}</div>
        <div class="kpi-detail">En espera de atención</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Solucionados</div>
        <div class="kpi-value" style="color: #16A34A;">${solucionados}</div>
        <div class="kpi-detail">${porcentajeSolucionados}% de resolución</div>
      </div>
    </div>

    <div class="seccion">
      <h2>Distribución de Problemas</h2>
      <div class="graficos">
        <div class="grafico-container">
          <canvas id="chartTipo"></canvas>
        </div>
        <div class="grafico-container">
          <canvas id="chartLocalidad"></canvas>
        </div>
      </div>
    </div>

    ${topProblemas.length > 0 ? `
    <div class="seccion">
      <h2>Top 3 Problemas Más Reportados</h2>
      <table class="tabla">
        <thead>
          <tr>
            <th>Problema</th>
            <th>Reportes</th>
            <th>Porcentaje</th>
          </tr>
        </thead>
        <tbody>
          ${topProblemas.map(p => `
            <tr>
              <td>${p.icon} ${p.nombre}</td>
              <td><strong>${p.count}</strong></td>
              <td>${total > 0 ? Math.round((p.count / total) * 100) : 0}%</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    ` : ''}

    ${topLocalidades.length > 0 ? `
    <div class="seccion">
      <h2>Top 3 Localidades con Más Reportes</h2>
      <table class="tabla">
        <thead>
          <tr>
            <th>Localidad</th>
            <th>Reportes</th>
            <th>Porcentaje</th>
          </tr>
        </thead>
        <tbody>
          ${topLocalidades.map(l => `
            <tr>
              <td><strong>${l.ciudad}</strong></td>
              <td>${l.count}</td>
              <td>${total > 0 ? Math.round((l.count / total) * 100) : 0}%</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    ` : ''}

    <div class="seccion">
      <h2>Estado General de Reportes</h2>
      <table class="tabla">
        <thead>
          <tr>
            <th>Estado</th>
            <th>Cantidad</th>
            <th>Porcentaje</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="badge badge-pendiente">Pendiente</span></td>
            <td><strong>${pendientes}</strong></td>
            <td>${total > 0 ? Math.round((pendientes / total) * 100) : 0}%</td>
          </tr>
          <tr>
            <td><span class="badge badge-solucionado">Solucionado</span></td>
            <td><strong>${solucionados}</strong></td>
            <td>${total > 0 ? Math.round((solucionados / total) * 100) : 0}%</td>
          </tr>
        </tbody>
      </table>
    </div>
  `;
  
  document.getElementById("content").innerHTML = html;
  
  // Crear gráficos
  crearGraficos(porTipo, porLocalidad);
}

function crearGraficos(porTipo, porLocalidad) {
  // Gráfico por tipo
  const ctxTipo = document.getElementById("chartTipo");
  if (ctxTipo) {
    if (charts.tipo) charts.tipo.destroy();
    
    const labels = Object.entries(porTipo).map(([id, _]) => categorias[id]?.name || id);
    const data = Object.values(porTipo);
    const colors = ['#7B2FBE', '#D4A5FF', '#FF006E', '#00D9FF', '#FFD60A', '#00FF41', '#FF9900'];
    
    charts.tipo = new Chart(ctxTipo, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors.slice(0, labels.length),
          borderColor: '#fff',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom' }
        }
      }
    });
  }
  
  // Gráfico por localidad
  const ctxLocalidad = document.getElementById("chartLocalidad");
  if (ctxLocalidad) {
    if (charts.localidad) charts.localidad.destroy();
    
    const labels = Object.keys(porLocalidad).sort((a, b) => porLocalidad[b] - porLocalidad[a]).slice(0, 10);
    const data = labels.map(l => porLocalidad[l]);
    
    charts.localidad = new Chart(ctxLocalidad, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Reportes',
          data: data,
          backgroundColor: '#7B2FBE',
          borderColor: '#5A1B8A',
          borderWidth: 1
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true }
        },
        scales: {
          x: { beginAtZero: true }
        }
      }
    });
  }
}
</script>

</body>
</html>
